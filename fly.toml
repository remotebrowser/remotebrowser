# fly.toml app configuration file generated for remotebrowser-prod on 2026-01-26T10:48:41-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

primary_region = 'sjc'

[build]

[http_service]
  internal_port = 23456
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20

  [http_service.http_options]
    idle_timeout = 180

  [[http_service.checks]]
    interval = '60s'
    timeout = '15s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-8x'
  memory = '2gb'
