<html rb-domain="lululemon" rb-priority="3">
  <head>
    <title>Lululemon Signin</title>
  </head>
  <body>
    <div>
      <div rb-match="div.infobox-error" rb-optional></div>
      <div rb-match="//button[contains(text(), 'Send one-time code')]" style="display: none"></div>
      <input
        autofocus
        placeholder="Password"
        type="password"
        name="password"
        data-testid="password"
        rb-match="input[data-testid='login-password-input']"
      />
      <button
        type="submit"
        data-testid="submit"
        rb-match="input[data-testid='login-signin-button']:not([disabled])"
      >
        Continue
      </button>
    </div>
  </body>
</html>
