<html rb-domain="chewy">
  <head>
    <title>Chewy Password</title>
  </head>
  <body>
    <p rb-optional rb-match="span#chewy-auth-alert-text"></p>
    <input
      autofocus
      name="password"
      type="password"
      data-testid="password"
      rb-match="input#password"
      placeholder="Password"
    />
    <button rb-autoclick rb-match="button#login-password-submit-button">Sign in</button>
  </body>
</html>
