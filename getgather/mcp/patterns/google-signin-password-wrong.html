<html rb-domain="google">
  <head>
    <title>Google Activity</title>
  </head>

  <body>
    <span
      rb-optional
      rb-match="//section/div/div/div/div/div/span[@jsslot][contains(normalize-space(), 'Wrong password')]"
    ></span>

    <input
      autofocus
      placeholder="Password"
      data-testid="password"
      rb-match="input[name='Passwd']"
      type="password"
      name="password"
    />
    <button type="submit" data-testid="submit" rb-match="//div[@id='passwordNext']//button">
      Next
    </button>
  </body>
</html>
