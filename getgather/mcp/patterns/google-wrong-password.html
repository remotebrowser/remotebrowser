<html rb-domain="google">
  <body>
    <div rb-match="//div[@jsname='B34EJ']//span[contains(., 'Wrong password')]"></div>
    <input
      autofocus
      placeholder="Password"
      data-testid="password"
      rb-match="input[name='Passwd']"
      type="password"
      name="password"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="//div[@id='passwordNext']//button[not(contains(@style, '--mdc-ripple-fg-size'))]"
    >
      Next
    </button>
  </body>
</html>
