<html rb-domain="walmart" rb-priority="1">
  <head>
    <title>Walmart Sign In - Send Verification Code</title>
  </head>
  <body>
    <h1 rb-match="h1.f3">Verify it's you</h1>
    <p rb-optional rb-match="[data-testid='identity-generic-choice-options'] .dark-gray"></p>
    <div
      rb-autoclick
      rb-match="//button[contains(text(), 'Send code') or contains(text(), 'Text me')]"
    ></div>
  </body>
</html>
