<html rb-domain="walmart">
  <body>
    <h1
      rb-stop
      rb-error="email_not_found"
      rb-match="//h1[contains(normalize-space(.), 'Create your Walmart account')]"
    >
      This email isn't registered with Walmart. Please create an account at walmart.com first, then
      try again.
    </h1>
  </body>
</html>
