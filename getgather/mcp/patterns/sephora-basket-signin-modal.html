<html rb-domain="sephora" rb-priority="0">
  <head>
    <title>Sephora Sign In Modal</title>
  </head>
  <body>
    <!-- Match the signin modal that appears on top of basket page -->
    <span rb-match="div#modal-root div[data-at='sign_in']"></span>
    <p rb-optional rb-match="p[data-at='sign_in_error']"></p>
    <input
      type="text"
      name="username"
      data-testid="username"
      rb-match="div#modal-root input#signin_username"
      placeholder="Email Address"
    />
    <input
      type="password"
      name="password"
      data-testid="password"
      rb-match="div#modal-root input#signin_password"
      placeholder="Password"
    />
    <input
      type="checkbox"
      name="stay_signed_in"
      rb-autoclick
      rb-match="div#modal-root input#signin_ssi"
      style="display: none"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="div#modal-root button[data-at='sign_in_button']"
    >
      Sign In
    </button>
  </body>
</html>
