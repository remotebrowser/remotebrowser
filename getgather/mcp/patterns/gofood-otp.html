<html rb-domain="gofood" rb-priority="2">
  <head>
    <title>GoFood Verification</title>
  </head>
  <body>
    <h1 rb-match="p.gf-heading-xl">Verification code sent securely to SMS</h1>
    <p rb-match="p.gf-body-m">Enter the code we've just sent to</p>
    <p rb-optional rb-match="//p[contains(text(), 'Invalid verification code')]"></p>
    <div class="otp-input">
      <label rb-match="p.gf-label-m">Enter code</label>
      <input
        name="otp"
        type="tel"
        data-testid="otp"
        rb-match="input[name='data.otp']"
        placeholder="4-digit OTP"
      />
    </div>
    <button type="submit" data-testid="submit" rb-match="button[type=submit]">Continue</button>
  </body>
</html>
