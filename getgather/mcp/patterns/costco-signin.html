<html gg-domain="costco" gg-action-delay="200">
  <head>
    <title>Costco Sign In</title>
  </head>
  <body>
    <p gg-optional gg-match="div.pageLevel"></p>

    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      gg-match="form#localAccountForm input#signInName"
    />
    <input
      name="password"
      type="password"
      placeholder="Password"
      gg-match="form#localAccountForm input#password"
    />
    <button type="submit" gg-match="form#localAccountForm button#next:not([disabled])">
      Sign In
    </button>

    <div style="display: flex; flex-direction: column">
      <div
        style="
          display: flex;
          align-items: center;
          text-align: center;
          width: 100%;
          margin-top: 12px;
          margin-bottom: 24px;
        "
      >
        <div style="position: relative; text-align: center; width: 100%">
          <hr />
          <span
            style="
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              background: white;
              padding: 0 12px;
            "
          >
            Other Ways to Sign In
          </span>
        </div>
      </div>
      <button
        name="button"
        value="otp"
        gg-optional
        gg-match="button#SignInWithOTPUsingEmailAddressExchange"
      >
        Receive a Passcode
      </button>
    </div>
  </body>
</html>
