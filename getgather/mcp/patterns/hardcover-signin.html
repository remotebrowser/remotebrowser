<html rb-domain="hardcover" rb-priority="1">
  <head>
    <title>Hardcover Sign In</title>
  </head>
  <body>
    <div>
      <p rb-optional rb-match="form p.text-red-600"></p>
      <input
        autofocus
        placeholder="Email"
        name="email"
        type="email"
        data-testid="email"
        rb-match="form input[type='email']"
      />
      <input
        placeholder="Password"
        name="password"
        type="password"
        data-testid="password"
        rb-match="form input[type='password']"
      />
      <button
        type="submit"
        data-testid="submit"
        rb-match="//form//button[@type='submit' and not(.//svg)]"
      >
        Sign in
      </button>
    </div>
  </body>
</html>
