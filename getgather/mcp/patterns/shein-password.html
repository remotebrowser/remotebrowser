<html rb-domain="shein" rb-priority="2">
  <head>
    <title>Shein Password</title>
  </head>
  <body>
    <p rb-match="//p[contains(., 'Sign In With Your Account')]"></p>
    <input
      autofocus
      placeholder="Password"
      name="password"
      type="password"
      data-testid="password"
      rb-match="div.sui-dialog__body div.page__login-newUI-emailPannel div.main-content input[type='password'][aria-label='Password:']"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="div.sui-dialog__body div.page__login-newUI-emailPannel div.login-point_button > button"
    >
      Sign In
    </button>
  </body>
</html>
