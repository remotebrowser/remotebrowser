<html rb-domain="nordstrom" rb-priority="1">
  <head>
    <title>Nordstrom Site Error</title>
  </head>
  <body>
    <div
      rb-stop
      rb-error="site_error"
      rb-match-html="//p[contains(., 'You can still shop and check out as a guest.')]"
    ></div>
    <div rb-match="//button[contains(., 'Keep Shopping')]"></div>
  </body>
</html>
