<html rb-domain="amazon">
  <head>
    <title>Create new password required</title>
  </head>
  <body>
    <h1
      rb-stop
      rb-error="create_new_password"
      rb-match-html="//h1[contains(., 'Create new password')]"
    ></h1>
    <span
      rb-match="//span[contains(@class, 'a-button-text') and contains(normalize-space(.), 'Save changes and Sign-In')]"
    ></span>
  </body>
</html>
