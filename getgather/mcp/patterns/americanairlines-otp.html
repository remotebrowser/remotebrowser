<html rb-domain="aa" rb-priority="1">
  <head>
    <title>American Airlines OTP</title>
  </head>
  <body>
    <span rb-optional rb-match="adc-inline-notification#adcNotification_0 span"></span>
    <div>
      <span rb-match="span[class*='_mfaheader_']">Enter verification code</span>
      <span rb-optional rb-match="span[class*='_info_']"></span>
      <strong rb-optional rb-match="span[class*='_email_']"></strong>
    </div>
    <span>6 Digit Verification Code:</span>
    <div class="otp-container">
      <input
        autofocus
        name="otp-1"
        type="text"
        inputmode="numeric"
        data-testid="otp-0"
        rb-match="div[class*='_otpinputgroup_'] adc-text-input:nth-of-type(1)"
      />
      <input
        name="otp-2"
        type="text"
        inputmode="numeric"
        data-testid="otp-1"
        rb-match="div[class*='_otpinputgroup_'] adc-text-input:nth-of-type(2)"
      />
      <input
        name="otp-3"
        type="text"
        inputmode="numeric"
        data-testid="otp-2"
        rb-match="div[class*='_otpinputgroup_'] adc-text-input:nth-of-type(3)"
      />
      <input
        name="otp-4"
        type="text"
        inputmode="numeric"
        data-testid="otp-3"
        rb-match="div[class*='_otpinputgroup_'] adc-text-input:nth-of-type(4)"
      />
      <input
        name="otp-5"
        type="text"
        inputmode="numeric"
        data-testid="otp-4"
        rb-match="div[class*='_otpinputgroup_'] adc-text-input:nth-of-type(5)"
      />
      <input
        name="otp-6"
        type="text"
        inputmode="numeric"
        data-testid="otp-5"
        rb-match="div[class*='_otpinputgroup_'] adc-text-input:nth-of-type(6)"
      />
    </div>

    <button type="submit" data-testid="submit" rb-match="div[class*='_verify_'] adc-button">
      Verify
    </button>
    <style>
      .otp-container {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .otp-container input {
        flex: 50px;
        height: 50px;
        font-size: 24px;
        text-align: center;
        border: 2px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.2s ease;
      }

      .otp-container input:focus {
        border-color: #007bff;
      }
    </style>
    <script>
      const inputs = document.querySelectorAll(".otp-container input");

      inputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
          const value = e.target.value;
          if (value && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
          }
        });
      });
    </script>
  </body>
</html>
