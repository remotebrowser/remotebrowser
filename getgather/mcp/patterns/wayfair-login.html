<html gg-domain="wayfair" priority="2">
  <head>
    <title>Wayfair Login</title>
  </head>
  <body>
    <input
      type="email"
      name="email"
      data-testid="email"
      gg-match="input[name=email]"
      placeholder="Email Address"
    />
    <button
      type="submit"
      data-testid="submit"
      gg-match="button[data-test-id='SUBMIT_BUTTON']:not([disabled])"
    >
      Continue
    </button>
  </body>
</html>
