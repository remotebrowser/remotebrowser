<html rb-domain="amazon">
  <head>
    <title>Card expiration date verification required</title>
  </head>
  <body>
    <h2
      rb-stop
      rb-error="reset_password"
      rb-match="//label[contains(@class, 'a-form-label') and contains(normalize-space(.), 'expiration date')]"
    >
      Card expiration date verification required
    </h2>
  </body>
</html>
