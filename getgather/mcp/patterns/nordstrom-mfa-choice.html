<html rb-domain="nordstrom" rb-priority="2">
  <head>
    <title>Nordstrom MFA Choice</title>
  </head>
  <body>
    <div>
      <p rb-optional rb-match="h1"></p>

      <p rb-match="//strong[contains(text(), 'How should we send your code?')]"></p>
      <div class="vertical-radios">
        <div class="radio-wrapper">
          <div style="font-size: 0">
            <input
              type="radio"
              name="delivery-method"
              id="EMAIL"
              data-testid="signin-method-email"
              rb-match="fieldset > label:nth-of-type(1)"
              value="EMAIL"
              checked
            />
          </div>
          <div>
            <label rb-optional for="email">Email</label>
            <strong
              rb-optional
              for="email"
              rb-match="fieldset > label:nth-of-type(1) strong"
            ></strong>
          </div>
        </div>
        <div class="radio-wrapper">
          <div style="font-size: 0">
            <input
              rb-optional
              type="radio"
              name="delivery-method"
              id="sms"
              data-testid="signin-method-sms"
              rb-match="fieldset > label:nth-of-type(2)"
              value="sms"
            />
          </div>
          <div>
            <label rb-optional for="sms">Text Message</label>
            <strong
              rb-optional
              for="sms"
              rb-match="fieldset > label:nth-of-type(2) strong"
            ></strong>
            <p
              style="font-size: 12px; color: #666"
              rb-optional
              for="sms"
              rb-match="fieldset > label:nth-of-type(2) span"
            ></p>
          </div>
        </div>
      </div>
      <button type="submit" data-testid="submit" rb-match="//button[contains(text(), 'Send Code')]">
        Send Code
      </button>
    </div>
  </body>
</html>
