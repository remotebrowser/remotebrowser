<html rb-domain="goodreads">
  <head>
    <title>Goodreads Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="div[aria-live] .a-alert-content"></p>
    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      data-testid="email"
      rb-match="input[type=email]"
    />
    <input
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      rb-match="input[type=password]"
    />
    <input
      name="remember"
      type="checkbox"
      checked
      rb-match="input[name=rememberMe]"
      style="display: none"
    />
    <button type="submit" data-testid="submit" rb-match="input[type=submit]">Sign in</button>
  </body>
</html>
