<html rb-domain="nike">
  <head>
    <title>Nike Verification</title>
  </head>
  <body>
    <div>
      <div rb-optional rb-match="form div[role='alert']"></div>
      <input
        autofocus
        placeholder="8-digit code"
        type="text"
        name="otp"
        data-testid="otp"
        rb-match="input#send-code"
      />
      <button
        type="submit"
        data-testid="submit"
        rb-match="//form//button[@type='submit' and contains(text(), 'Sign In')]"
      >
        Continue
      </button>
    </div>
  </body>
</html>
