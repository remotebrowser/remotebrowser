<html gg-domain="google" gg-priority="3">
  <head>
    <title>Google Activity</title>
  </head>
  <body>
    <div
      gg-match="//div[@class='dMNVAe' and contains(normalize-space(.), 'Google Authenticator')]"
    ></div>
    <input
      autofocus
      name="totpPin"
      type="tel"
      data-testid="otp"
      gg-match="input[name='totpPin']"
      placeholder="Enter code"
      aria-label="Enter code"
    />
    <button type="submit" data-testid="submit" gg-match="#totpNext button:not([disabled])">
      Next
    </button>
  </body>
</html>
