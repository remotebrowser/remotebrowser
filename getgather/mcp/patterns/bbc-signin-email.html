<html rb-domain="bbc">
  <head>
    <title>BBC Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="p.sb-form-message__content__text"></p>
    <label rb-optional rb-match="label#username-label">Email</label>
    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      data-testid="username"
      rb-match="input#username"
    />
    <button type="submit" data-testid="submit" rb-match="button[type=submit]">Sign in</button>
  </body>
</html>
