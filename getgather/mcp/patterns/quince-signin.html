<html rb-domain="quince" rb-priority="3">
  <head>
    <title>Quince Sign In</title>
  </head>
  <body>
    <input
      type="email"
      name="username"
      data-testid="email"
      rb-match="input[type=email][name=username]"
      placeholder="Email"
    />
    <button type="submit" data-testid="submit" rb-match="button[form='login-form-A-Initial']">
      Continue
    </button>
  </body>
</html>
