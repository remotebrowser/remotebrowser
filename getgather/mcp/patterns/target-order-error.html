<html gg-domain="target" gg-priority="-2" gg-error="order_error">
  <head>
    <title>Target Order Error</title>
  </head>
  <body>
    <div gg-match=".styles_ndsAlertCard__YtwCK.styles_warning__u2sW1"></div>
    <button
      gg-match="//button[@type='submit' and contains(normalize-space(.), 'Sign in with password')]"
      gg-autoclick-delay="20"
    >
      Sign in with password
    </button>
  </body>
</html>
