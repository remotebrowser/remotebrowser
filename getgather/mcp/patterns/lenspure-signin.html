<html rb-domain="lenspure" rb-priority="1">
  <body>
    <span rb-optional rb-match="ul.woocommerce-error li"></span>
    <input
      autofocus
      placeholder="Email"
      data-testid="username"
      rb-match="input#username"
      type="text"
      name="userId"
    />
    <input
      placeholder="Password"
      data-testid="password"
      rb-match="input#password"
      type="password"
      name="password"
    />
    <button type="submit" data-testid="submit" rb-match="input[type=submit]">Login</button>
  </body>
</html>
