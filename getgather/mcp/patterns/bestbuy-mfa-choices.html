<html rb-domain="bestbuy" rb-priority="5">
  <head>
    <title>Best Buy Verification Code</title>
  </head>
  <body>
    <p rb-optional rb-match="h1"></p>

    <div class="vertical-radios">
      <div class="radio-wrapper">
        <input
          type="radio"
          name="signin-option-radio"
          id="password-radio"
          data-testid="signin-method-password"
          rb-match="input#password-radio"
          value="password-radio"
          checked
        />
        <label for="password-radio" rb-match="label[for=password-radio]">Use password</label>
      </div>
      <div class="radio-wrapper">
        <input
          rb-optional
          type="radio"
          name="signin-option-radio"
          id="email-code-radio"
          data-testid="signin-method-email"
          rb-match="input#email-code-radio"
          value="email-code-radio"
        />
        <label rb-optional for="email-code-radio" rb-match="label[for=email-code-radio]"
          >Use email code</label
        >
      </div>
      <div class="radio-wrapper">
        <input
          rb-optional
          type="radio"
          name="signin-option-radio"
          id="sms-radio"
          data-testid="signin-method-sms"
          rb-match="input#sms-radio"
          value="sms-radio"
        />
        <label rb-optional for="sms-radio" rb-match="label[for=sms-radio]">Use email link</label>
      </div>
    </div>
    <button type="submit" data-testid="submit" rb-match="button[type=submit]">Continue</button>
  </body>
</html>
