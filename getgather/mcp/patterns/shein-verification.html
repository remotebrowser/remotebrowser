<html rb-domain="shein" rb-priority="1">
  <body>
    <p rb-match="div.sui-dialog__body div.head"></p>
    <div>
      <span rb-match="div.sui-dialog__body div.email span:nth-of-type(1)"></span>
      <span rb-match="div.sui-dialog__body div.email span:nth-of-type(2)"></span>
    </div>
    <p rb-optional rb-match="p.error-tip"></p>
    <input
      autofocus
      name="code"
      type="text"
      maxlength="5"
      data-testid="otp"
      rb-match="div.code-input input[maxlength='5']"
    />
    <button type="submit" data-testid="submit" rb-match="div.sui-dialog__body button.confirm-btn">
      SUBMIT
    </button>
  </body>
</html>
