<html rb-domain="horizonhobby" rb-priority="2">
  <head>
    <title>Horizon Hobby Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="form[data-test='login-form'] div.alert__root"></p>
    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      data-testid="email"
      rb-match="input#email"
    />
    <input
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      rb-match="input#password"
    />
    <button
      type="submit"
      rb-autoclick
      rb-match="//button[@type='submit' and .//p[contains(text(), 'Sign In')]]"
    >
      Sign in
    </button>
  </body>
</html>
