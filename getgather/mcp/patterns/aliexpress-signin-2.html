<html rb-domain="aliexpress" rb-priority="2">
  <head>
    <title>Sign in</title>
  </head>
  <body>
    <input
      name="email"
      type="email"
      data-testid="email"
      rb-match="input[label='Email']"
      placeholder="Email or phone number"
    />
    <button data-testid="submit" rb-match="button[aria-label='Continue']" type="submit">
      Continue
    </button>
  </body>
</html>
