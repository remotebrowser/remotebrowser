<html rb-domain="alltrails">
  <head>
    <title>AllTrails Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="div[class*=serverError]"></p>
    <input
      type="email"
      data-testid="email"
      rb-match="input#userEmail"
      placeholder="Email Address"
      name="email"
    />
    <input
      type="password"
      data-testid="password"
      rb-match="input#userPassword"
      placeholder="Password"
      name="password"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="button[data-testid='email-password-login-button']"
    >
      Sign in
    </button>
  </body>
</html>
