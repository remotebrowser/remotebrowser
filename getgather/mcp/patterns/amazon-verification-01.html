<html rb-domain="amazon" rb-priority="9">
  <head>
    <title>Amazon Verification</title>
  </head>
  <body>
    <h1 rb-match="//h1[contains(normalize-space(.), 'Verify mobile number')]">
      Verify mobile number
    </h1>
    <span
      rb-optional
      rb-match="//div[@id='instruction_text']//span[contains(normalize-space(.), 'your mobile number')]"
    ></span>
    <input
      autofocus
      name="otpCode"
      type="tel"
      placeholder="Enter code"
      data-testid="otp"
      rb-match="input#cvf-input-code"
    />
    <button type="submit" data-testid="submit" rb-match="input[type=submit]">Sign in</button>
  </body>
</html>
