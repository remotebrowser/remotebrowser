<html rb-domain="google" rb-priority="2">
  <head>
    <title>Google Activity</title>
  </head>
  <body>
    <div
      rb-match="//div[@class='dMNVAe' and contains(normalize-space(.), 'A text message with a 6-digit verification code')]"
    ></div>
    <input
      autofocus
      name="Pin"
      type="tel"
      data-testid="otp"
      rb-match="input#idvPin"
      placeholder="Enter the code"
      aria-label="Enter the code"
    />

    <input type="text" value="submit" name="submit" style="display: none" />
    <button rb-autoclick rb-match="div#idvPreregisteredPhoneNext">I've done this</button>
  </body>
</html>
