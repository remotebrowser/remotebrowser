<html gg-domain="google" gg-priority="2">
  <head>
    <title>Google Activity</title>
  </head>
  <body>
    <div
      gg-match="//div[@class='dMNVAe' and contains(normalize-space(.), 'A text message with a 6-digit verification code')]"
    ></div>
    <input
      autofocus
      name="Pin"
      type="tel"
      data-testid="otp"
      gg-match="input#idvPin"
      placeholder="Enter the code"
      aria-label="Enter the code"
    />

    <input type="text" value="submit" name="submit" style="display: none" />
    <button gg-autoclick gg-match="div#idvPreregisteredPhoneNext">I've done this</button>
  </body>
</html>
