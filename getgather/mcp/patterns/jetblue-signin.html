<html rb-domain="jetblue" rb-priority="2">
  <body>
    <p rb-optional rb-match="div.infobox-error"></p>
    <input
      autofocus
      type="text"
      name="identifier"
      placeholder="Email"
      data-testid="username"
      rb-match="input[name='identifier']"
    />
    <input
      type="password"
      name="password"
      placeholder="Password"
      data-testid="password"
      rb-match="input[name='credentials.passcode']"
    />
    <button
      type="submit"
      rb-autoclick
      rb-match="div.o-form-button-bar input[type=submit]:not([disabled])"
    >
      Sign In
    </button>
  </body>
</html>
