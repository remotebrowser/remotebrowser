<html gg-domain="amazon">
  <head>
    <title>Amazon Verification</title>
  </head>
  <body>
    <span gg-optional gg-match="div#verifyAlerts"></span>
    <h2 gg-match="//span[contains(normalize-space(.), 'Open your Amazon shopping app')]">
      Open your Amazon shopping app
    </h2>
    <p gg-optional gg-match="div#signInPrompt span"></p>
    <input
      autofocus
      name="otp"
      type="tel"
      inputmode="numeric"
      placeholder="Enter security code"
      data-testid="otp"
      gg-match="input#input-box-otp"
    />
    <button
      type="submit"
      data-testid="submit"
      gg-match="span#cvf-submit-otp-button input[type=submit]"
    >
      Verify
    </button>
  </body>
</html>
