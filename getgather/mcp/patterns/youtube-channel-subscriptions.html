<html rb-domain="youtube" rb-priority="-2">
  <body>
    <h1 rb-match="ytd-channel-renderer"></h1>
    <div
      rb-convert="youtube-channel-subscriptions.json"
      rb-match="ytd-channel-renderer a.channel-link[href^='/@']"
      rb-stop
    ></div>
    <div rb-match-html="ytd-section-list-renderer" rb-stop></div>
  </body>
</html>
