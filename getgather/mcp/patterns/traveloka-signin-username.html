<html rb-domain="traveloka" rb-priority="3">
  <head>
    <title>Traveloka Sign In</title>
  </head>
  <body>
    <input
      name="userid"
      type="text"
      data-testid="username"
      rb-match="input[data-testid='auth-username']"
      placeholder="Email or phone number"
    />
    <button type="submit" data-testid="submit">Continue</button>
  </body>
</html>
