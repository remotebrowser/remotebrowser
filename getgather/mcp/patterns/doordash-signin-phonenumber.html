<html rb-domain="doordash">
  <head>
    <title>Doordash Sign In with Phone Number</title>
  </head>
  <body>
    <p
      id="message"
      rb-optional
      rb-match="//form[@id='guided-email-phone-form']//span[contains(text(), 'Enter the phone')]"
    />
    <input
      autofocus
      id="doordash-phonenumber"
      name="phonenumber"
      type="tel"
      placeholder="Phone Number"
      data-testid="phone"
      rb-match="form#guided-email-phone-form input[type=tel]"
    />

    <p
      id="error"
      style="color: red"
      rb-optional
      rb-match="div[data-anchor-id=IdentityErrorBanner]"
    />

    <button
      type="submit"
      data-testid="submit"
      rb-match="//form[@id='guided-email-phone-form']//button[normalize-space(.)='Continue']"
    >
      Continue
    </button>
  </body>
</html>
