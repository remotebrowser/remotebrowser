<html rb-domain="officedepot" rb-priority="2">
  <head>
    <title>Office Depot Sign In</title>
  </head>
  <body>
    <input
      type="email"
      data-testid="username"
      rb-match="input[name=loginName]"
      placeholder="Email Address"
      name="email"
    />
    <input
      type="password"
      data-testid="password"
      rb-match="input[name=password]"
      placeholder="Password"
      name="password"
    />
    <button type="submit" data-testid="submit" rb-match="input#order_history_login_btn">
      Log in
    </button>
  </body>
</html>
