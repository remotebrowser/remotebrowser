<html rb-domain="wayfair">
  <head>
    <title>Wayfair Password</title>
  </head>
  <body>
    <h1 rb-match="[data-test-id='AuthHeaderTitle']">Welcome Back!</h1>
    <span rb-match="[data-test-id='READ_ONLY_EMAIL']"></span>
    <span rb-optional rb-match="[data-test-id='login-password-input-validationText']"></span>

    <input
      type="password"
      name="password"
      data-testid="password"
      rb-match="input[name=password]"
      placeholder="Password"
    />
    <button type="submit" data-testid="submit" rb-match="button[data-test-id='SIGN_IN_BUTTON']">
      Sign In
    </button>

    <div style="display: flex; flex-direction: column; gap: 12px">
      <div style="display: flex; align-items: center; text-align: center">
        <div style="flex: 1; height: 1px; background-color: #333"></div>
        <span style="padding: 0 12px; white-space: nowrap">Other Ways to Sign In</span>
        <div style="flex: 1; height: 1px; background-color: #333"></div>
      </div>
      <button
        name="button"
        value="email"
        rb-optional
        data-testid="signin-method-sms"
        rb-match="[data-test-id='OTHER_SIGN_IN_METHODS_SMS_BUTTON']"
      >
        Text Me a Code
      </button>
    </div>
  </body>
</html>
