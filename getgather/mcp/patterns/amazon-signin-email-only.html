<html rb-domain="amazon">
  <head>
    <title>Amazon Sign In - Email</title>
  </head>
  <body>
    <span rb-optional rb-match="div#auth-email-missing-alert"></span>
    <span rb-optional rb-match="div#auth-email-invalid-claim-alert"></span>
    <span rb-optional rb-match="div#auth-error-message-box div.a-alert-content"></span>

    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email or mobile phone number"
      data-testid="email"
      rb-match="input#ap_email"
    />
    <button type="submit" data-testid="submit" rb-match="input#continue[type=submit]">
      Continue
    </button>
  </body>
</html>
