<html rb-domain="safeway">
  <head>
    <title>Safeway Verification</title>
  </head>

  <body>
    <p id="error" style="color: red" rb-optional rb-match="div.input-field__help-text--error"></p>

    <h2 rb-match="div.enter-otp h2.auth-styles__title"></h2>
    <div>
      <div rb-match="div.enter-otp  div.enter-otp__subtitle"></div>
      <p rb-match-html="div.enter-otp  p:nth-of-type(1)"></p>
    </div>

    <input
      autofocus
      name="otp"
      type="text"
      placeholder="Verification Code"
      data-testid="otp"
      rb-match="form input[formcontrolname='otpCode']"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="//form//button[@type='submit' and not(.//div[contains(@class, 'pp-loading-spinner')])]"
    >
      Sign in
    </button>
    <script>
      const span = document.querySelector("span");
      if (span) {
        span.remove();
      }
    </script>
  </body>
</html>
