<html rb-domain="lazada" rb-priority="2">
  <head>
    <title>Sign in</title>
  </head>

  <body>
    <div rb-optional rb-match="div[class='iweb-mask iweb-toast-mask'] div.iweb-toast-wrap"></div>
    <input
      name="email"
      type="text"
      data-testid="username"
      rb-match="div#login-container div.iweb-input-container input[type='text']"
      placeholder="Please enter your Phone or Email"
    />
    <input
      name="password"
      type="password"
      data-testid="password"
      rb-match="div#login-container div.iweb-input-container input[type='password']"
      placeholder="Password"
    />
    <button type="submit" data-testid="submit" rb-match="div#login-container button[type='button']">
      Login
    </button>
  </body>
</html>
