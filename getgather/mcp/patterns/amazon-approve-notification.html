<html rb-domain="amazon">
  <head>
    <title>Approve notification</title>
  </head>
  <body>
    <h2
      rb-match="//span[contains(@class, 'transaction-approval-word-break') and contains(normalize-space(.), 'approve the notification sent to')]"
    >
      Approve the notification sent to
    </h2>
    <div rb-match-html="#channelDetailsWithImprovedLayout"></div>
    <input type="text" value="submit" name="submit" style="display: none" />
    <button type="submit" data-testid="submit">I've done this</button>
  </body>
</html>
