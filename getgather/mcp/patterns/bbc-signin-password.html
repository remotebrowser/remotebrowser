<html rb-domain="bbc">
  <head>
    <title>BBC Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="[data-bbc-metadata*=error] p"></p>
    <p rb-optional rb-match="p.sb-form-message__content__text"></p>
    <label rb-optional rb-match="label#password-label">Password</label>
    <input
      autofocus
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      rb-match="input[type=password]"
    />
    <button type="submit" data-testid="submit" rb-match="form[novalidate] [type=submit]">
      Sign in
    </button>
  </body>
</html>
