<html rb-domain="bestbuy" rb-priority="1">
  <head>
    <title>Best Buy Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match=".tb-validation"></p>
    <p rb-optional rb-match="div[role=alert]"></p>
    <input
      autofocus
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      rb-match="input[type=password]"
    />
    <button type="submit" data-testid="submit" rb-match="form[novalidate] [type=submit]">
      Sign in
    </button>
  </body>
</html>
