<html rb-domain="google" rb-priority="2">
  <head>
    <title>Google Activity</title>
  </head>
  <body>
    <div rb-match="div[jsname='B34EJ']"></div>
    <input
      autofocus
      name="totpPin"
      type="tel"
      data-testid="otp"
      rb-match="input[name='totpPin']"
      placeholder="Enter code"
      aria-label="Enter code"
    />
    <button type="submit" data-testid="submit" rb-match="#totpNext button:not([disabled])">
      Next
    </button>
  </body>
</html>
