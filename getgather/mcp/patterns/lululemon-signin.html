<html rb-domain="lululemon" rb-priority="1">
  <head>
    <title>Lululemon Signin</title>
  </head>
  <body>
    <div>
      <input
        autofocus
        placeholder="Email"
        type="email"
        name="identifier"
        data-testid="username"
        rb-match="input[name='identifier']"
      />
      <button
        type="submit"
        data-testid="submit"
        rb-match="input[data-testid='login-signin-button']:not([disabled])"
      >
        Continue
      </button>
    </div>
  </body>
</html>
