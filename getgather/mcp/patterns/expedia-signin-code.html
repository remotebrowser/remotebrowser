<html rb-domain="expedia" rb-priority="2">
  <head>
    <title>Expedia Sign In Code</title>
  </head>
  <body>
    <p rb-optional rb-match="div.uitk-banner-critical"></p>
    <input
      placeholder="Code"
      type="text"
      name="code"
      autofocus
      data-testid="otp"
      rb-match="input#verify-sms-one-time-passcode-input"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="button#verifyOtpFormSubmitButton:not([disabled])"
    >
      Continue
    </button>
  </body>
</html>
