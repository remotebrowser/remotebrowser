<html rb-domain="amazon">
  <head>
    <title>Amazon Security Question</title>
  </head>
  <body>
    <h1 rb-match="//h1[normalize-space(.)='Thank you']" style="display: none">Thank you</h1>
    <label rb-optional rb-match="label.a-form-label"></label>
    <input
      autofocus
      name="dcq_question_subjective_1"
      type="text"
      placeholder="Answer"
      data-testid="answer"
      rb-match="input[name='dcq_question_subjective_1']"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="span.cvf-widget-btn-verify-dcq input[type=submit]"
    >
      Continue
    </button>
  </body>
</html>
