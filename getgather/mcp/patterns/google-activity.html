<html rb-domain="google">
  <head>
    <title>Google Activity</title>
  </head>
  <body>
    <h2 rb-match="//div[contains(normalize-space(.), 'My Google Activity')]"></h2>
    <p
      rb-match="//p[contains(normalize-space(.), 'You can see and delete your activity using the controls on this page.')]"
    ></p>
    <div rb-convert="google-activity.json" rb-match-html="body" rb-stop></div>
  </body>
</html>
