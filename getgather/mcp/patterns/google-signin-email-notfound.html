<html rb-domain="google" rb-priority="-2">
  <body>
    <input
      autofocus
      placeholder="Email"
      data-testid="username"
      rb-match="input#identifierId"
      type="email"
      name="email"
    />
    <div
      rb-match="//div[@jsname='B34EJ'][contains(., 'find your Google Account')]"
      style="color: red; font-size: 12px"
    ></div>
    <button type="submit" data-testid="submit" rb-match="div#identifierNext">Next</button>
  </body>
</html>
