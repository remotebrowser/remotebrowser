<html rb-domain="shein" rb-priority="4">
  <head>
    <title>Shein Orders</title>
  </head>
  <body>
    <input
      autofocus
      placeholder="Email"
      type="text"
      name="username"
      data-testid="email"
      rb-match="input[aria-label='Email Address:']"
    />
    <button type="submit" data-testid="submit" rb-match="div.login-point_button > button">
      Continue
    </button>
  </body>
</html>
