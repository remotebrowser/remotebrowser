<html gg-domain="target">
  <head>
    <title>Target Sign In - Password</title>
  </head>
  <body>
    <input
      name="password"
      type="password"
      placeholder="Password"
      gg-match="input[data-test='login-password']"
    />
    <button type="submit" gg-match="//button[@type='submit' and contains(normalize-space(.), 'Sign in with password')]">
      Sign in with password
    </button>
  </body>
</html>
