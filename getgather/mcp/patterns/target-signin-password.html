<html rb-domain="target">
  <head>
    <title>Target Sign In - Password</title>
  </head>
  <body>
    <input
      name="password"
      type="password"
      placeholder="Password"
      rb-match="input[data-test='login-password']"
      data-testid="password"
    />
    <button
      type="submit"
      rb-match="//button[@type='submit' and contains(normalize-space(.), 'Sign in with password')]"
      data-testid="submit"
    >
      Sign in with password
    </button>
  </body>
</html>
