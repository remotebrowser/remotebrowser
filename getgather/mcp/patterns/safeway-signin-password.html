<html rb-domain="safeway">
  <head>
    <title>Safeway Sign In - Password</title>
  </head>

  <body>
    <p id="error-password" style="color: red" rb-optional rb-match="div#errorMsg-pw"></p>

    <p id="error" style="color: red" rb-optional rb-match="div.input-field__help-text--error"></p>

    <div>
      <div rb-match="enter-password > div.enter-otp div.enter-otp__subtitle"></div>
      <p rb-match-html="enter-password > div.enter-otp p.title-xs"></p>
    </div>

    <input
      autofocus
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      rb-match="form input#password"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="//form//button[@type='submit' and not(.//div[contains(@class, 'pp-loading-spinner')])]"
    >
      Sign in
    </button>
    <script>
      const span = document.querySelector("span");
      if (span) {
        span.remove();
      }
    </script>
  </body>
</html>
