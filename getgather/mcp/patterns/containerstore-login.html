<html rb-domain="containerstore" priority="2">
  <body>
    <p rb-optional rb-match="div.error"></p>
    <input
      autofocus
      name="email"
      type="email"
      data-testid="username"
      rb-match="input#signInName"
      placeholder="Email"
    />
    <input
      name="password"
      type="password"
      data-testid="password"
      rb-match="input#password"
      placeholder="Password"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="//button[@id='next' and contains(text(), 'Sign in')]"
    >
      Sign in
    </button>
  </body>
</html>
