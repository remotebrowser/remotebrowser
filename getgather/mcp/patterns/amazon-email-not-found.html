<html rb-domain="amazon" rb-priority="6">
  <body>
    <p>You do not have an account with this email, please try again with a different email.</p>
    <p rb-match-html="//h1[contains(., 'new to Amazon')]" style="display: none"></p>
    <input rb-match="input[name='email']" name="none" value="none" style="display: none" />
    <button type="submit" data-testid="submit" rb-match="a[href*='/ap/signin?']">
      Sign in with another email or mobile
    </button>
  </body>
</html>
