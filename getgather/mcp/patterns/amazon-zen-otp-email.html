<html rb-domain="amazon" rb-priority="5">
  <head>
    <title>Amazon Verification</title>
  </head>
  <body>
    <span rb-optional rb-match="div#verifyAlerts"></span>
    <span rb-optional rb-match="div#verifyFailureAlerts"></span>
    <h2 rb-match="//h2[contains(., 'Enter verification code')]">Enter verification code</h2>
    <span rb-optional rb-match="//span[contains(., 'your email')]"></span>
    <input
      autofocus
      name="otp"
      type="tel"
      placeholder="OTP"
      data-testid="otp"
      rb-match="input#input-box-otp"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="span#cvf-submit-otp-button input[type=submit]"
    >
      Submit code
    </button>
  </body>
</html>
