<html rb-domain="agoda" rb-priority="1">
  <body>
    <h2>Sign in or create an account</h2>
    <input
      name="email"
      type="email"
      data-testid="email"
      rb-match="input[type=email]"
      placeholder="Email"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="button[data-element-name='universal-login-unified-auth-email-continue']"
    >
      Continue
    </button>
  </body>
</html>
