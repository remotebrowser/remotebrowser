<html rb-domain="amazon" rb-priority="6">
  <head>
    <title>Amazon Browsing History Empty</title>
  </head>
  <body>
    <span
      rb-stop
      rb-error="browsing_history_empty"
      rb-stop-html="//span[contains(., 'You have no recently viewed items.')]"
    ></span>
    <span
      rb-match="//p[contains(., 'These items were viewed recently. We use them to personalize recommendations.')]"
    ></span>
    <div rb-match="a[data-nav-ref='nav_youraccount_btn']"></div>
  </body>
</html>
