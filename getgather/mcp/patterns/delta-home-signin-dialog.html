<html rb-domain="delta" rb-priority="2">
  <body>
    <div rb-match="div.login-modal-container"></div>
    <p rb-optional rb-match="idp-form-alert div p span"></p>
    <input
      autofocus
      placeholder="SkyMiles Number Or Username"
      name="userid"
      type="text"
      data-testid="username"
      rb-match="input#userId"
    />
    <input
      placeholder="Password"
      name="password"
      type="password"
      data-testid="password"
      rb-match="input#password"
    />
    <button type="submit" data-testid="submit" rb-match="button[data-cy='idp-button-Log In']">
      Log In
    </button>
  </body>
</html>
