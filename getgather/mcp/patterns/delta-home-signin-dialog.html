<html gg-domain="delta" gg-priority="2">
  <body>
    <div gg-match="div.login-modal-container"></div>
    <p gg-optional gg-match="idp-form-alert div p span"></p>
    <input
      autofocus
      placeholder="SkyMiles Number Or Username"
      name="userid"
      type="text"
      data-testid="email"
      gg-match="input#userId"
    />
    <input
      placeholder="Password"
      name="password"
      type="password"
      data-testid="password"
      gg-match="input#password"
    />
    <button type="submit" data-testid="submit" gg-match="button[data-cy='idp-button-Log In']">
      Log In
    </button>
  </body>
</html>
