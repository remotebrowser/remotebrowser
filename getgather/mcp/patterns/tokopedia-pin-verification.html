<html rb-domain="tokopedia" rb-priority="1">
  <head>
    <title>Tokopedia PIN Verification</title>
  </head>
  <body>
    <div rb-match="//div[contains(text(), 'Masukkan Kode Verifikasi')]">
      Masukkan Kode Verifikasi
    </div>
    <div
      rb-optional
      rb-match="//div[contains(text(), 'Masukkan 6 digit PIN Tokopedia kamu')]"
    ></div>
    <input
      name="pin"
      type="tel"
      data-testid="otp"
      rb-match="input[type=tel][maxlength='6'][aria-label='pin input']"
      placeholder="PIN"
    />
    <span rb-optional rb-match="span[aria-label='forgot pin']"></span>
    <button type="submit" data-testid="submit">Submit</button>
  </body>
</html>
