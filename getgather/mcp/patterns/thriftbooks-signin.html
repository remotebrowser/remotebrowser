<html rb-domain="thriftbooks">
  <head>
    <title>ThriftBooks Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="div#emailErrorContainer"></p>
    <input
      type="email"
      name="email"
      data-testid="email"
      rb-match="input#ExistingAccount_EmailAddress"
      placeholder="Email Address"
    />
    <input
      type="password"
      name="password"
      data-testid="password"
      rb-match="input#ExistingAccount_Password"
      placeholder="Password"
    />
    <button type="submit" data-testid="submit" rb-match="div.LoginBox-submitArea input.Button">
      Log In
    </button>
  </body>
</html>
