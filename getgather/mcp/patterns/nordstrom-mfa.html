<html rb-domain="nordstrom" rb-priority="2">
  <head>
    <title>Sign In to Nordstrom</title>
  </head>

  <body>
    <h1 rb-match="//span[contains(text(), 'Enter your code to sign in')]"></h1>
    <span rb-optional rb-match="span[data-cy='hit-a-snag-error']"></span>
    <div>
      <div rb-optional rb-match="//section/div[contains(., 'We sent a code to:')]"></div>
      <strong
        rb-optional
        rb-match="//section/div[contains(., 'We sent a code to:')]/div/strong"
      ></strong>
    </div>
    <input
      inputmode="numeric"
      autofocus
      name="code"
      type="text"
      data-testid="otp"
      rb-match="input[name='code']"
      placeholder="Code"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="//button[@type='button' and contains(., 'Verify and Sign in')]"
    >
      Verify and Sign in
    </button>
  </body>
</html>
