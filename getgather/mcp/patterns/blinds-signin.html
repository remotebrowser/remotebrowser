<html gg-domain="blinds" gg-priority="1">
  <head>
    <title>Blinds Sign In</title>
  </head>
  <body>
    <div gg-match="div#sign-in-sign-up-content-wrapper">Sign in</div>
    <input
      autofocus
      name="email"
      type="email"
      data-testid="email"
      gg-match="div#sign-in-sign-up-content-wrapper input#login-email"
      placeholder="Email Address"
    />
    <input
      password
      name="password"
      type="password"
      data-testid="password"
      gg-match="div#sign-in-sign-up-content-wrapper input#login-password"
      placeholder="Password"
    />
    <button
      type="submit"
      data-testid="submit"
      gg-match="div#sign-in-sign-up-content-wrapper button[data-test-id='my-account-login-button']:not([disabled])"
    >
      Login to My Account
    </button>
  </body>
</html>
