<html rb-domain="google">
  <head>
    <title>Google Activity</title>
  </head>
  <body>
    <input
      autofocus
      placeholder="Email"
      data-testid="username"
      rb-match="input#identifierId"
      type="email"
      name="email"
    />
    <button
      type="submit"
      rb-autoclick
      rb-match="div#identifierNext button:not([style*='--mdc-ripple-fg-size'])"
    >
      Next
    </button>
  </body>
</html>
