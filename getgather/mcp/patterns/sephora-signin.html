<html rb-domain="sephora" rb-priority="2">
  <head>
    <title>Sephora Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="p[data-at='sign_in_error']"></p>
    <input
      type="text"
      name="username"
      data-testid="username"
      rb-match="input#signin_username"
      placeholder="Email Address"
    />
    <input
      type="password"
      name="password"
      data-testid="password"
      rb-match="input#signin_password"
      placeholder="Password"
    />
    <input
      type="checkbox"
      name="stay_signed_in"
      rb-autoclick
      rb-match="input#signin_ssi"
      style="display: none"
    />
    <button
      type="submit"
      rb-autoclick
      rb-match="//button[@data-at='sign_in_button' and contains(., 'Sign In') and not(@disabled)]"
    >
      Sign In
    </button>
  </body>
</html>
