<html rb-domain="target">
  <head>
    <title>Target Sign In</title>
  </head>
  <body>
    <input
      autofocus
      name="email"
      type="text"
      placeholder="Email or username"
      rb-match="input#username"
      data-testid="username"
    />
    <button type="submit" rb-match="button#login" data-testid="submit">Continue</button>
  </body>
</html>
