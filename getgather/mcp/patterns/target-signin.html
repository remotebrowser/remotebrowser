<html gg-domain="target">
  <head>
    <title>Target Sign In</title>
  </head>
  <body>
    <input
      autofocus
      name="email"
      type="text"
      placeholder="Email or username"
      gg-match="input#username"
    />
    <button type="submit" gg-match="button#login">Continue</button>
  </body>
</html>
