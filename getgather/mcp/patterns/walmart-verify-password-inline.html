<html gg-domain="walmart" gg-priority="0">
  <head>
    <title>Walmart Sign In - Verify It's You (Password)</title>
  </head>
  <body>
    <h1 gg-match="h1.f3">Verify it's you</h1>
    <input
      autofocus
      name="password"
      type="password"
      placeholder="Password"
      gg-match="form#sign-in-form input[name='password'][type='password']"
    />
    <button type="submit" gg-match="button#withpassword-continue-button">Continue</button>
  </body>
</html>
