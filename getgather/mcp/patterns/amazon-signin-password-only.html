<html rb-domain="amazon">
  <head>
    <title>Amazon Sign In - Password</title>
  </head>

  <body>
    <span rb-match="span#auth-email-claim"></span>
    <span rb-optional rb-match="div#auth-password-missing-alert"></span>
    <div>
      <h4 rb-optional rb-match="div#auth-error-message-box h4.a-alert-heading"></h4>
      <div rb-optional rb-match="div#auth-error-message-box div.a-alert-content"></div>
    </div>
    <input
      autofocus
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      rb-match="input#ap_password"
    />
    <button type="submit" data-testid="submit" rb-match="input#signInSubmit[type=submit]">
      Sign in
    </button>
  </body>
</html>
