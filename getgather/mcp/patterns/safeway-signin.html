<html rb-domain="safeway">
  <head>
    <title>Safeway Sign In</title>
  </head>

  <body>
    <p id="error" style="color: red" rb-optional rb-match="div.input-field__help-text--error"></p>

    <input
      autofocus
      name="email"
      type="text"
      placeholder="Email or mobile number"
      data-testid="username"
      rb-match="form input#enterUsername"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="//form//button[@type='submit' and not(.//div[contains(@class, 'pp-loading-spinner')])]"
    >
      Sign in
    </button>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const input = document.querySelector("input[name='email']");
        if (!input) return;
        const form = input.form;
        if (!form) return;
        form.addEventListener("submit", function () {
          const value = input.value || "";
          if (value.indexOf("@") !== -1) {
            input.value = value.trim().replace(/\s+/g, "");
          } else {
            let digits = value.replace(/[^0-9]/g, "");
            while (digits.length > 0 && (digits[0] === "0" || digits[0] === "1")) {
              digits = digits.slice(1);
            }
            input.value = digits;
          }
        });
      });
    </script>
  </body>
</html>
