<html gg-domain="safeway">
  <head>
    <title>Safeway Sign In</title>
  </head>

  <body>
    <p id="error" style="color: red" gg-optional gg-match="div.input-field__help-text--error"></p>

    <input
      autofocus
      name="email"
      type="text"
      placeholder="Email or mobile number"
      data-testid="username"
      gg-match="form input#enterUsername"
    />
    <button
      type="submit"
      data-testid="submit"
      gg-match="//form//button[@type='submit' and not(.//div[contains(@class, 'pp-loading-spinner')])]"
    >
      Sign in
    </button>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const input = document.querySelector("input[name='email']");
        if (!input) return;
        const form = input.form;
        if (!form) return;
        form.addEventListener("submit", function () {
          const value = input.value || "";
          if (value.indexOf("@") === -1) {
            input.value = value.replace(/[^0-9]/g, "");
          }
        });
      });
    </script>
  </body>
</html>
