<html rb-domain="aa" rb-priority="2">
  <head>
    <title>American Airlines Signin</title>
  </head>
  <body>
    <div
      rb-optional
      rb-autoclick
      rb-match="//button[contains(@class, 'ot-pc-refuse-all-handler') and contains(., 'Reject All')]"
    ></div>
    <p rb-optional rb-match="adc-inline-notification[role='alert'][kind='error']"></p>
    <input
      type="text"
      data-testid="username"
      rb-match="adc-text-input[name='username']"
      placeholder="AAdvantage® # or username"
      name="username"
    />
    <input
      type="password"
      data-testid="password"
      rb-match="adc-text-input[name='password']"
      placeholder="Password"
      name="password"
    />
    <button type="submit" data-testid="submit" rb-match="div.loginButton adc-button">Log in</button>
  </body>
</html>
