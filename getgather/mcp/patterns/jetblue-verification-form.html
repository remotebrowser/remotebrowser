<html rb-domain="jetblue" rb-priority="2">
  <body>
    <p rb-optional rb-match="div.infobox-error"></p>
    <h2 rb-match="h2#first-focus"></h2>
    <div rb-match="p.okta-form-subtitle"></div>
    <input
      autofocus
      type="text"
      name="otp"
      placeholder="Verification code"
      data-testid="otp"
      rb-match="input[name='credentials.passcode']"
    />
    <button
      type="submit"
      rb-autoclick
      rb-match="div.o-form-button-bar input[type=submit]:not([disabled])"
    >
      Verify
    </button>
  </body>
</html>
