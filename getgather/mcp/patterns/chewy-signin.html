<html rb-domain="chewy">
  <head>
    <title>Chewy Sign In</title>
  </head>
  <body>
    <input
      out
      name="email"
      type="email"
      data-testid="username"
      rb-match="input#username"
      placeholder="Email"
    />
    <button type="submit" data-testid="submit" rb-match="button#kc-login">Continue</button>
  </body>
</html>
