<html rb-domain="aliexpress" rb-priority="1">
  <head>
    <title>Verification</title>
  </head>
  <body>
    <span rb-match="//div[contains(text(), 'Email verification code')]"></span>
    <span rb-match="div.subTitle_field_item"></span>
    <input
      name="otp"
      type="tel"
      data-testid="otp"
      rb-match="input[data-id='0']"
      placeholder="OTP"
    />
    <button type="submit" data-testid="submit" rb-match="button#j-test">Verify</button>
  </body>
</html>
