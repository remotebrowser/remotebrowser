<html gg-domain="quince" gg-priority="2">
  <head>
    <title>Quince Password</title>
  </head>
  <body>
    <input
      type="password"
      name="password"
      data-testid="password"
      gg-match="input[type=password][name=password]"
      placeholder="Password"
    />
    <button
      type="submit"
      data-testid="submit"
      gg-match="form#login-form-A-secondary button[type='submit']"
    >
      Continue
    </button>
  </body>
</html>
