<html gg-domain="shopee" gg-priority="2">
  <head>
    <title>Shopee Sign In</title>
  </head>

  <body>
    <input
      autofocus
      name="loginKey"
      type="text"
      data-testid="email"
      gg-match="input[name='loginKey']"
      placeholder="No. Handphone/Username/Email"
    />
    <input
      name="password"
      type="password"
      data-testid="password"
      gg-match="input[name='password']"
      placeholder="Password"
    />

    <button
      type="submit"
      data-testid="submit"
      gg-match="//button[contains(normalize-space(.),'Log In') or contains(normalize-space(.),'Log in')]"
    >
      Log in
    </button>
  </body>
</html>
