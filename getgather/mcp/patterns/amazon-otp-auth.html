<html rb-domain="amazon">
  <head>
    <title>Amazon Verification</title>
  </head>
  <body>
    <h1 rb-match="//h1[contains(., 'Two-Step Verification')]">Two-Step Verification</h1>
    <input
      autofocus
      name="otpCode"
      type="tel"
      placeholder="Enter code"
      data-testid="otp"
      rb-match="input#auth-mfa-otpcode"
    />
    <input
      rb-optional
      id="rememberDevice"
      name="rememberDevice"
      type="checkbox"
      rb-match="input#auth-mfa-remember-device"
      style="display: none"
    />
    <button type="submit" data-testid="submit" rb-match="input#auth-signin-button[type=submit]">
      Sign in
    </button>
  </body>
</html>
