<html rb-domain="doordash">
  <head>
    <title>Doordash Sign In Email & Password</title>
  </head>
  <body>
    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      data-testid="email"
      rb-match="form#guided-email-password-form input[type=email]"
    />
    <input
      autofocus
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      rb-match="form#guided-email-password-form input[type=password]"
    />
    <button type="submit" data-testid="submit" rb-match="button#login-submit-button">
      Continue to sign in
    </button>
    <p
      id="error"
      style="color: red"
      rb-optional
      rb-match="form#guided-email-password-form div[data-anchor-id=IdentityErrorBanner]"
    />
  </body>
</html>
