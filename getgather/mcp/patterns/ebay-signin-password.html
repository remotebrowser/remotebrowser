<html gg-domain="ebay">
  <head>
    <title>Sign In to Ebay</title>
  </head>
  <body>
    <p gg-optional gg-match="p#signin-error-msg"></p>
    <input
      autofocus
      name="pass"
      type="password"
      data-testid="password"
      gg-match="input#pass"
      placeholder="Password"
    />
    <button type="submit" data-testid="submit" gg-match="//button[@id='sgnBt']">Sign in</button>
  </body>
</html>
