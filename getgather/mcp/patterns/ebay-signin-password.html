<html rb-domain="ebay">
  <head>
    <title>Sign In to Ebay</title>
  </head>
  <body>
    <p rb-optional rb-match="p#signin-error-msg"></p>
    <input
      autofocus
      name="pass"
      type="password"
      data-testid="password"
      rb-match="input#pass"
      placeholder="Password"
    />
    <button type="submit" data-testid="submit" rb-match="//button[@id='sgnBt']">Sign in</button>
  </body>
</html>
