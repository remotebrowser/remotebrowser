<html gg-domain="nike">
  <head>
    <title>Nike Sign In</title>
  </head>
  <body>
    <div>
      <input
        autofocus
        placeholder="Email"
        type="text"
        name="email"
        data-testid="username"
        gg-match="input#username"
      />
      <button
        type="submit"
        data-testid="submit"
        gg-match="//form//button[@type='submit' and contains(text(), 'Continue')]"
      >
        Continue
      </button>
    </div>
  </body>
</html>
