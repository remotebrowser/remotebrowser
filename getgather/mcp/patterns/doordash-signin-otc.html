<html rb-domain="doordash">
  <head>
    <title>Doordash Sign In Code</title>
  </head>
  <body>
    <!-- dpage splices only this <body> into html_renderer; <head> is omitted, so pattern CSS must live here. -->
    <style>
      @media (max-width: 768px) {
        #doordash-otc input {
          padding-left: 0;
          padding-right: 0;
        }
      }
    </style>
    <p id="message" rb-optional rb-match-html="form#otc-submit-form > span:nth-of-type(1)" />
    <div
      id="doordash-otc"
      style="
        width: 100%;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        display: grid;
        gap: 10px;
      "
    >
      <input
        autofocus
        name="otc-1"
        type="text"
        style="width: 100%; box-sizing: border-box; text-align: center"
        inputmode="numeric"
        pattern="[0-9]"
        maxlength="1"
        data-testid="otp-0"
        rb-match="form#otc-submit-form input[type=number][aria-label='0']"
        value="0"
      />
      <input
        name="otc-2"
        type="text"
        style="width: 100%; box-sizing: border-box; text-align: center"
        inputmode="numeric"
        pattern="[0-9]"
        maxlength="1"
        data-testid="otp-1"
        rb-match="form#otc-submit-form input[type=number][aria-label='1']"
        value="0"
      />
      <input
        name="otc-3"
        type="text"
        style="width: 100%; box-sizing: border-box; text-align: center"
        inputmode="numeric"
        pattern="[0-9]"
        maxlength="1"
        data-testid="otp-2"
        rb-match="form#otc-submit-form input[type=number][aria-label='2']"
        value="0"
      />
      <input
        name="otc-4"
        type="text"
        style="width: 100%; box-sizing: border-box; text-align: center"
        inputmode="numeric"
        pattern="[0-9]"
        maxlength="1"
        data-testid="otp-3"
        rb-match="form#otc-submit-form input[type=number][aria-label='3']"
        value="0"
      />
      <input
        name="otc-5"
        type="text"
        style="width: 100%; box-sizing: border-box; text-align: center"
        inputmode="numeric"
        pattern="[0-9]"
        maxlength="1"
        data-testid="otp-4"
        rb-match="form#otc-submit-form input[type=number][aria-label='4']"
        value="0"
      />
      <input
        name="otc-6"
        type="text"
        style="width: 100%; box-sizing: border-box; text-align: center"
        inputmode="numeric"
        pattern="[0-9]"
        maxlength="1"
        data-testid="otp-5"
        rb-match="form#otc-submit-form input[type=number][aria-label='5']"
        value="0"
      />
    </div>
    <script>
      const button = document.querySelector("button[kind='BUTTON/LINK']");
      if (button) {
        button.remove();
      }

      const box = document.getElementById("doordash-otc");
      const inputs = [...box.querySelectorAll("input")];

      box.addEventListener("focusin", (e) => {
        if (e.target.tagName !== "INPUT") return;
        setTimeout(() => e.target.select(), 0);
      });

      box.addEventListener("input", (e) => {
        const i = inputs.indexOf(e.target);
        if (i < 0) return;
        e.target.value = e.target.value.replace(/\D/g, "").slice(-1);
        if (e.target.value && inputs[i + 1]) inputs[i + 1].focus();
      });

      box.addEventListener("keydown", (e) => {
        const i = inputs.indexOf(e.target);
        if (i < 0) return;

        if (e.key === "Backspace" && !e.target.value && inputs[i - 1]) {
          inputs[i - 1].focus();
        }
      });
    </script>
    <p
      id="error"
      style="color: red"
      rb-optional
      rb-match="form#otc-submit-form span:nth-child(5)"
    />
    <button type="submit" data-testid="submit" rb-match="button#otc-submit-button">Sign in</button>
  </body>
</html>
