<html rb-domain="adidas">
  <head>
    <title>Adidas Password</title>
  </head>
  <body>
    <p rb-optional rb-match="div#password--error"></p>
    <p rb-optional rb-match="p._error_tbedu_60"></p>
    <input
      autofocus
      name="password"
      type="password"
      data-testid="password"
      rb-match="input#password"
      placeholder="Password"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="button#login-submit-button:not([disabled]) span"
    >
      Sign In
    </button>
  </body>
</html>
