<html rb-domain="tokopedia" rb-priority="1">
  <head>
    <title>Tokopedia Password</title>
  </head>
  <body>
    <span rb-match="//span[contains(text(), 'Masuk ke Tokopedia')]">Masuk ke Tokopedia</span>
    <p rb-optional rb-match="div#password p"></p>
    <input
      name="password"
      type="password"
      data-testid="password"
      rb-match="input[type=password]"
      placeholder="Password"
    />
    <button type="submit" data-testid="submit" rb-match="button[data-testid=button-submit]">
      Masuk
    </button>
  </body>
</html>
