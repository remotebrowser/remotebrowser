<html gg-domain="nordstrom" gg-priority="3">
  <head>
    <title>Welcome back!</title>
  </head>
  <body>
    <p gg-match="span[data-cy='wrong-user-credentials-error']"></p>
    <input
      autofocus
      name="password"
      type="password"
      data-testid="password"
      gg-match="form#sign-in input[name='password']"
      placeholder="Password"
    />
    <button
      type="submit"
      data-testid="submit"
      gg-match="//button[@alt='sign in button' and contains(., 'Sign In')]"
    >
      Sign In
    </button>
  </body>
</html>
