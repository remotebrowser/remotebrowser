<html rb-domain="zillow">
  <head>
    <title>Zillow Sign In</title>
  </head>
  <body>
    <input
      type="email"
      name="email"
      data-testid="username"
      rb-match="input[data-testid=identifier-input]"
      placeholder="Email Address"
    />
    <button type="submit" data-testid="submit" rb-match="button#submit-form-button">
      Continue
    </button>
  </body>
</html>
