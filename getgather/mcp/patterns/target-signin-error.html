<html gg-domain="target" gg-priority="-2">
  <head>
    <title>Target Sign In Error</title>
  </head>
  <body>
    <div
      gg-stop
      gg-error="signin_error"
      gg-match="//div[contains(., 'Something went wrong on our end')]"
    ></div>
    <input gg-match="input[data-test='login-password']" type="password" />
  </body>
</html>
