<html rb-domain="target" rb-priority="-2">
  <head>
    <title>Target Sign In Error</title>
  </head>
  <body>
    <div
      rb-stop
      rb-error="signin_error"
      rb-match="//div[contains(., 'Something went wrong on our end')]"
    ></div>
    <input data-testid="password" rb-match="input[data-test='login-password']" type="password" />
  </body>
</html>
