<html rb-domain="gofood" rb-priority="3">
  <head>
    <title>GoFood Login</title>
  </head>
  <body>
    <h1 rb-match="p.gf-heading-xl">Enter your phone number</h1>
    <p rb-match="p.gf-body-m">You can log in or make an account</p>
    <div class="phone-input">
      <label rb-match="p.gf-label-m">Phone number</label>
      <input
        type="tel"
        name="phone"
        data-testid="phone"
        rb-match="input[data-testid='phone-number-field']"
        placeholder="Phone number"
      />
    </div>
    <button type="submit" data-testid="submit" rb-match="button[type=submit]">Continue</button>
  </body>
</html>
