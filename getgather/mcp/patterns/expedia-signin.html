<html rb-domain="expedia" rb-priority="2">
  <head>
    <title>Expedia Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="div.uitk-banner-critical"></p>
    <input
      autofocus
      placeholder="Email"
      type="text"
      name="loginFormEmailInput"
      data-testid="email"
      rb-match="input#loginFormEmailInput"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="button#loginFormSubmitButton:not([disabled])"
    >
      Continue
    </button>
  </body>
</html>
