<html rb-domain="amazon">
  <head>
    <title>Amazon account is closed</title>
  </head>
  <body>
    <h4
      rb-stop
      rb-error="reset_password"
      rb-match="//h4[contains(@class, 'a-alert-heading') and normalize-space(.)='Amazon account is closed']"
    >
      Amazon account is closed
    </h4>
  </body>
</html>
