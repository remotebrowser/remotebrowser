<html rb-domain="birds.cornell">
  <head>
    <title>Sign In to eBird</title>
  </head>

  <body>
    <p rb-optional rb-match="div.Message-content > p"></p>
    <input
      autofocus
      placeholder="Email"
      name="username"
      type="text"
      data-testid="username"
      rb-match="input#input-user-name"
    />
    <input
      placeholder="Password"
      name="password"
      type="password"
      data-testid="password"
      rb-match="input#input-password"
    />
    <button type="submit" data-testid="submit" rb-match="input#form-submit">Sign in</button>
  </body>
</html>
