<html rb-domain="petsmart">
  <head>
    <title>PetSmart Sign In</title>
  </head>
  <body>
    <h2 rb-optional rb-match=".sparky-c-alert--error h2"></h2>
    <div rb-optional rb-match=".sparky-c-alert--error div.sparky-c-text-passage"></div>
    <input
      type="email"
      name="email"
      data-testid="email"
      rb-match="input#email"
      placeholder="Email"
    />
    <input
      type="password"
      name="password"
      data-testid="password"
      rb-match="input#password"
      placeholder="Password"
    />
    <button
      type="submit"
      rb-autoclick
      rb-match="button[data-testid='signInCta']:not(:has(.sparky-c-button__icon))"
    >
      Sign in
    </button>
  </body>
</html>
