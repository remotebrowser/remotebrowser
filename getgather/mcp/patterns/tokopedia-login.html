<html rb-domain="tokopedia" rb-priority="2">
  <head>
    <title>Tokopedia Sign In</title>
  </head>
  <body>
    <input
      name="login"
      type="text"
      data-testid="username"
      rb-match="input[name=login]"
      placeholder="Masukkan nomor ponsel atau email"
    />
    <button type="submit" data-testid="submit" rb-match="button[data-testid=button-submit]">
      Selanjutnya
    </button>
  </body>
</html>
