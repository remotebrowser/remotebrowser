<html rb-domain="amazon" rb-priority="5">
  <head>
    <title>Amazon Verification</title>
  </head>
  <body>
    <span rb-optional rb-match="div#verifyAlerts"></span>
    <span rb-match="//span[contains(., 'Open your Amazon shopping app')]"></span>
    <input
      autofocus
      name="otpCode"
      type="tel"
      placeholder="OTP"
      data-testid="otp"
      rb-match="input#input-box-otp"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="span#cvf-submit-otp-button input[type=submit]"
    >
      Verify
    </button>
  </body>
</html>
