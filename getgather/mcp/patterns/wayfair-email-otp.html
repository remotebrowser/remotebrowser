<html rb-domain="wayfair">
  <head>
    <title>Wayfair Email Verification</title>
  </head>
  <body>
    <h1 rb-match="[data-test-id='AuthHeaderTitle']">Enter the Code We Emailed You</h1>
    <span rb-match="[data-test-id='READ_ONLY_EMAIL']"></span>
    <span rb-optional rb-match="[data-test-id='CODE_INPUT-validationText']"></span>

    <input
      type="text"
      name="otp"
      data-testid="otp"
      rb-match="input[name=otp]"
      placeholder="Emailed Code"
    />
    <button type="submit" data-testid="submit" rb-match="button[data-test-id='SIGN_IN_BUTTON']">
      Sign In
    </button>

    <div style="display: flex; flex-direction: column; gap: 12px">
      <div style="display: flex; align-items: center; text-align: center">
        <div style="flex: 1; height: 1px; background-color: #333"></div>
        <span style="padding: 0 12px; white-space: nowrap">Other Ways to Sign In</span>
        <div style="flex: 1; height: 1px; background-color: #333"></div>
      </div>
      <button
        name="button"
        value="password"
        rb-optional
        data-testid="signin-method-password"
        rb-match="[data-test-id='OTHER_SIGN_IN_METHODS_PASSWORD_LOGIN_BUTTON']"
      >
        Sign In With Your Password
      </button>
    </div>
  </body>
</html>
