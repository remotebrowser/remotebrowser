<html rb-domain="walmart" rb-action-delay="200">
  <head>
    <title>Walmart Sign In - Email or Phone</title>
  </head>
  <body>
    <span
      class="error-box"
      rb-optional
      rb-match="div[data-testid='dropdown'] section div span"
    ></span>
    <span
      class="error-box"
      rb-optional
      rb-match="xpath=//span[contains(text(),'Please enter a valid number or email')]"
    ></span>
    <input
      autofocus
      name="email"
      type="text"
      placeholder="Phone number or email (required)"
      data-testid="username"
      rb-match="input[aria-label='Phone number or email (required)']"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="button#login-continue-button:not([disabled])"
    >
      Continue
    </button>
  </body>
</html>
