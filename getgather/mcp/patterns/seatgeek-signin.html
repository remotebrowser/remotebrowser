<html rb-domain="seatgeek">
  <head>
    <title>SeatGeek Signin</title>
  </head>
  <body>
    <div>
      <h3 rb-match="h3#login-heading"></h3>
      <p rb-optional rb-match="div[data-testid='error']"></p>
      <input
        autofocus
        placeholder="Email"
        data-testid="email"
        rb-match="input[data-uniform-id='input-email']"
        type="email"
        name="email"
      />
      <button
        type="submit"
        data-testid="submit"
        rb-match="//button/span/span[contains(text(), 'Instantly log in with email')]"
      >
        Sign in
      </button>
    </div>
  </body>
</html>
