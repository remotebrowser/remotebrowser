<html rb-domain="amainhobbies" rb-priority="2">
  <head>
    <title>A Main Hobbies Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="div#loginpage div.mainRed span"></p>
    <input
      autofocus
      name="email"
      type="text"
      data-testid="email"
      rb-match="input#EmailAddress"
      placeholder="Email Address"
    />
    <input
      name="password"
      type="password"
      data-testid="password"
      rb-match="input#Password"
      placeholder="Password"
    />
    <button type="submit" data-testid="submit" rb-match="div.submit button">Login</button>
  </body>
</html>
