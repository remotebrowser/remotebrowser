<html rb-domain="amazon">
  <head>
    <title>ZIP code required</title>
  </head>
  <body>
    <h2 rb-match="//h1[contains(normalize-space(.), 'Almost done!')]">Almost done!</h2>
    <p rb-match-html="//p[contains(normalize-space(.), 'ZIP code')]"></p>

    <label>ZIP code</label>
    <input data-testid="zip-code" rb-match="#ap_zip" type="text" name="zipCode" />
    <button data-testid="submit" rb-match="#continue" type="submit">Continue</button>
  </body>
</html>
