<html gg-domain="amazon" gg-priority="1">
  <head>
    <title>Verify with WhatsApp</title>
  </head>
  <body>
    <span gg-optional gg-match="div#verifyAlerts"></span>
    <span gg-optional gg-match="div#verifyFailureAlerts"></span>
    <h2 gg-match="//span[contains(normalize-space(.), 'Verify with WhatsApp')]">
      Verify with WhatsApp
    </h2>
    <span gg-match="div#channelDetailsForOtp"></span>
    <input
      autofocus
      name="otp"
      type="tel"
      placeholder="OTP"
      data-testid="otp"
      gg-match="input#input-box-otp"
    />
    <button
      type="submit"
      data-testid="submit"
      gg-match="span#cvf-submit-otp-button input[type=submit]"
    >
      Verify
    </button>
  </body>
</html>
