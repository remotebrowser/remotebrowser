<html rb-domain="marriott">
  <body>
    <span rb-optional rb-match="div[data-testid='verify-your-code-form-error']"></span>
    <input
      autofocus
      type="number"
      name="code"
      data-testid="otp"
      rb-match="input[name='input-text-Verification Code']"
    />
    <button
      rb-autoclick
      type="submit"
      rb-match="button[data-testid='verify-button']:not([disabled])"
    >
      Verify
    </button>
  </body>
</html>
