<html rb-domain="ikea">
  <head>
    <title>Ikea Signin</title>
  </head>
  <body>
    <span rb-optional rb-match="span.form-field__message"></span>
    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      data-testid="username"
      rb-match="//input[@id='email' or @id='passwordless-primary-login-form-username']"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="//button[@type='submit' and contains(., 'Continue') and not(.//span[contains(@class, 'btn__loader')])]"
    >
      Continue
    </button>
  </body>
</html>
