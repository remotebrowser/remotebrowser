<html gg-domain="youtube" gg-priority="0">
  <head>
    <title>YouTube: Select a channel</title>
  </head>
  <body>
    <div>
      <p
        class="subtitle"
        gg-match="//ytd-channel-switcher-renderer//h2//yt-formatted-string[contains(normalize-space(.), 'Select a channel')]"
      ></p>
      <div class="vertical-radios">
        <div class="radio-wrapper">
          <div style="font-size: 0">
            <input
              type="radio"
              name="youtube-channel"
              id="yt-ch-1"
              value="1"
              checked
              data-testid="option-1"
              gg-match="ytd-account-item-section-renderer #contents ytd-account-item-renderer:nth-of-type(1) tp-yt-paper-icon-item"
            />
          </div>
          <div>
            <label for="yt-ch-1"></label>
            <span
              gg-match="ytd-account-item-section-renderer #contents ytd-account-item-renderer:nth-of-type(1) yt-formatted-string#channel-title"
            ></span>
          </div>
        </div>
        <div class="radio-wrapper">
          <div style="font-size: 0">
            <input
              gg-optional
              type="radio"
              name="youtube-channel"
              id="yt-ch-2"
              value="2"
              data-testid="option-2"
              gg-match="ytd-account-item-section-renderer #contents ytd-account-item-renderer:nth-of-type(2) tp-yt-paper-icon-item"
            />
          </div>
          <div>
            <label gg-optional for="yt-ch-2"></label>
            <span
              gg-optional
              gg-match="ytd-account-item-section-renderer #contents ytd-account-item-renderer:nth-of-type(2) yt-formatted-string#channel-title"
            ></span>
          </div>
        </div>
        <div class="radio-wrapper">
          <div style="font-size: 0">
            <input
              gg-optional
              type="radio"
              name="youtube-channel"
              id="yt-ch-3"
              value="3"
              data-testid="option-3"
              gg-match="ytd-account-item-section-renderer #contents ytd-account-item-renderer:nth-of-type(3) tp-yt-paper-icon-item"
            />
          </div>
          <div>
            <label gg-optional for="yt-ch-3"></label>
            <span
              gg-optional
              gg-match="ytd-account-item-section-renderer #contents ytd-account-item-renderer:nth-of-type(3) yt-formatted-string#channel-title"
            ></span>
          </div>
        </div>
      </div>
      <button type="submit" data-testid="submit">Use selected channel</button>
    </div>
  </body>
</html>
