<html gg-domain="cnn">
  <head>
    <title>CNN Sign In</title>
  </head>
  <body>
    <input
      autofocus
      name="loginEmail"
      type="email"
      placeholder="Email"
      data-testid="email"
      gg-match="input#login-email-input"
    />
    <input
      name="loginPassword"
      type="password"
      placeholder="Password"
      data-testid="password"
      gg-match="input#login-password-input"
    />
    <button
      type="submit"
      data-testid="submit"
      gg-match="button[type=submit]:not([aria-disabled=true])"
    >
      Sign in
    </button>
  </body>
</html>
