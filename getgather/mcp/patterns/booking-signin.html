<html rb-domain="booking">
  <head>
    <title>Booking Sign In</title>
  </head>
  <body>
    <p rb-optional rb-match="div#username-note"></p>
    <input
      autofocus
      placeholder="Email"
      name="email"
      type="email"
      data-testid="username"
      rb-match="div:not(.app--loading) form input#username"
    />
    <button type="submit" data-testid="submit" rb-match="form button[type='submit'] span">
      Continue
    </button>
  </body>
</html>
