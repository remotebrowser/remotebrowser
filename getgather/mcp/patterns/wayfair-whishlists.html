<html rb-domain="wayfair">
  <body>
    <div>
      <div rb-match="div[data-hb-id='BoxV3'] > h1[data-cypress-id='page-title']"></div>
      <div
        rb-match="div[data-hb-id='BoxV3'] div.ListCard a[data-hb-id='Card'] div.ListCardImages"
      ></div>
      <div
        rb-convert="wayfair-whishlists.json"
        rb-match-html="//div[@data-hb-id='Wrapper'][contains(., 'My Lists')]"
        rb-stop
      ></div>
    </div>
  </body>
</html>
