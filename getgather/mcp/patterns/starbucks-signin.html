<html rb-domain="starbucks">
  <head>
    <title>Starbucks Sign In</title>
  </head>
  <body>
    <div
      rb-optional
      rb-autoclick
      rb-match="xpath=//button[@id='truste-consent-button' and contains(text(), 'Agree')]"
    >
      Agree
    </div>
    <span rb-optional rb-match="div[class*='alert___']"></span>
    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      data-testid="username"
      rb-match="input#username"
    />
    <input
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      rb-match="input#password"
    />
    <button type="submit" data-testid="submit" rb-match="button[type=submit]">Sign in</button>
  </body>
</html>
