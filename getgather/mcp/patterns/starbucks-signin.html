<html gg-domain="starbucks">
  <head>
    <title>Starbucks Sign In</title>
  </head>
  <body>
    <div
      gg-optional
      gg-autoclick
      gg-match="xpath=//button[@id='truste-consent-button' and contains(text(), 'Agree')]"
    >
      Agree
    </div>
    <span gg-optional gg-match="div[class*='alert___']"></span>
    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      data-testid="email"
      gg-match="input#username"
    />
    <input
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      gg-match="input#password"
    />
    <button type="submit" data-testid="submit" gg-match="button[type=submit]">Sign in</button>
  </body>
</html>
