<html gg-domain="traveloka" gg-priority="1">
  <head>
    <title>Traveloka Verification</title>
  </head>
  <body>
    <div gg-match="//h1[contains(text(), 'Input Verification Code')]"></div>
    <input
      name="otp"
      type="tel"
      data-testid="otp"
      gg-match="input[inputmode=decimal]"
      placeholder="OTP"
    />
    <button type="submit" data-testid="submit">Submit</button>
  </body>
</html>
