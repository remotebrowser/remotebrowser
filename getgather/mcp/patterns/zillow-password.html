<html rb-domain="zillow">
  <body>
    <p rb-optional rb-match="p#password-error"></p>
    <input
      name="password"
      data-testid="password"
      rb-match="input[data-testid=password-input]"
      type="password"
      placeholder="Password"
    />
    <button type="submit" data-testid="submit" rb-match="button#submit-form-button">
      Continue
    </button>
  </body>
</html>
