<html rb-domain="kroger">
  <head>
    <title>Kroger Sign In</title>
  </head>

  <body>
    <p rb-optional rb-match="div#claimVerificationServerError[aria-hidden='false']"></p>

    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      data-testid="username"
      rb-match="form#attributeVerification input#signInName"
    />
    <input
      name="password"
      type="password"
      placeholder="Password"
      data-testid="password"
      rb-match="form#attributeVerification input#password"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="form#attributeVerification button#continue:not([disabled])"
    >
      Sign in
    </button>
  </body>
</html>
