<html rb-domain="shein" rb-priority="3">
  <head>
    <title>Shein Email Not Found</title>
  </head>
  <body>
    <p>You do not have an account with this email, please try again with a different email.</p>
    <input
      rb-match="div.sui-dialog__body input[type='password']"
      name="none"
      value="none"
      style="display: none"
    />
    <button
      type="submit"
      data-testid="submit"
      rb-match="div:not([style*='display: none']) > div.go-back"
    >
      Go Back
    </button>
  </body>
</html>
