<html rb-domain="bestbuy">
  <head>
    <title>Best Buy Verification Code</title>
  </head>
  <body>
    <p rb-optional rb-match="h1"></p>
    <p rb-optional rb-match="div[role=alert]"></p>
    <p rb-optional rb-match="form div.text-center"></p>
    <input
      autofocus
      name="verificationCode"
      type="text"
      inputmode="numeric"
      placeholder="Verification Code"
      data-testid="otp"
      rb-match="input#verificationCode"
    />
    <button type="submit" data-testid="submit" rb-match="button[type=submit]">Confirm</button>
  </body>
</html>
