name: Static Analysis
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-format:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - name: Check backend formatting
        run: uv run ruff check .

      - name: Check backend code style
        run: uv run ruff format --check .

  frontend-format:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend

      - name: Check frontend formatting
        run: make check-frontend-format

  backend-types:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - name: Check backend types with ty
        run: uv run ty check

      - name: Check backend types with pyright
        run: uv run pyright .

  yaml-format:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - name: Check YAML formatting
        run: uv run yamlfix --check $(find . -type f -name '*.yml' -o -name '*.yaml' | grep -v -E '\.venv/|node_modules/|mcp-tools\.yaml')

  pattern-testids:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - name: Check pattern data-testid convention
        run: uv run python scripts/check_pattern_testids.py
