name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      demo:
        description: Deploy remotebrowser (demo)
        required: false
        type: boolean
        default: true
      dev:
        description: Deploy remotebrowser-dev
        required: false
        type: boolean
        default: true
      daytona:
        description: Deploy remotebrowser-daytona
        required: false
        type: boolean
        default: true

jobs:
  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.pm.outputs.matrix }}
    steps:
      - id: pm
        uses: remotebrowser/shared-github-actions/prepare-matrix@v1
        with:
          entries: |
            { "env": "demo",    "config": "demo",    "app_name": "remotebrowser"     }
            { "env": "dev",     "config": "dev",     "app_name": "remotebrowser-dev" }
            { "env": "daytona", "config": "daytona", "app_name": "remotebrowser-daytona" }
          selections: |
            ${{ inputs.demo    && 'demo'    || '' }}
            ${{ inputs.dev     && 'dev'     || '' }}
            ${{ inputs.daytona && 'daytona' || '' }}
          key-field: env

  deploy:
    needs: prepare-matrix
    name: Deploy ${{ matrix.app_name }}
    runs-on: ubuntu-22.04
    concurrency: deploy-${{ matrix.app_name }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: remotebrowser/shared-github-actions/deploy-fly@v1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: remotebrowser
          doppler-config: ${{ matrix.config }}
          app-name: ${{ matrix.app_name }}
          build-args: ${{ matrix.env == 'daytona' && 'BROWSER_BACKEND=daytona' || '' }}
