name: Container

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  built-in:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Start Podman socket
        run: |
          sudo systemctl enable --now podman.socket
          sudo chmod 755 /run/podman
          sudo chmod 666 /run/podman/podman.sock

      - name: Verify Podman socket
        env:
          CONTAINER_HOST: unix:///run/podman/podman.sock
        run: podman --remote run --rm quay.io/podman/hello

      - name: Pull Chromium container image
        env:
          CONTAINER_HOST: unix:///run/podman/podman.sock
        run: podman --remote pull ghcr.io/remotebrowser/chromium-live

      - uses: remotebrowser/shared-github-actions/container-health-check@v1
        with:
          image-name: getgather
          health-checks: |
            {"url": "http://localhost:23456/health"}
            {"url": "http://localhost:23456/extended-health"}
          health-timeout-seconds: 180
          extra-config: |-
            --network host
            -e CONTAINER_HOST=unix:///run/podman/podman.sock
            -v /run/podman/podman.sock:/run/podman/podman.sock

  external:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Prepare the browser container image
        run: podman pull ghcr.io/remotebrowser/chromium-live

      - uses: actions/checkout@v6

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - run: uvx hatch build

      - name: Launch a simulated remote Chrome Fleet at port 8300
        run: uvx ./dist/*.whl &
        env:
          PORT: 8300

      - name: Run the health check validation
        run: while ! curl -s 'http://localhost:8300/health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Run the extended health check validation
        run: while ! curl -s 'http://localhost:8300/extended-health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - uses: remotebrowser/shared-github-actions/container-health-check@v1
        with:
          image-name: getgather
          health-checks: |
            {"url": "http://localhost:23456/health"}
            {"url": "http://localhost:23456/extended-health"}
          health-timeout-seconds: 180
          extra-config: |-
            --network host
            -e CHROMEFLEET_URL=http://localhost:8300
            -e CHROMEFLEET_CDP_OPEN_TIMEOUT_SECONDS=120

  daytona:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Connect to Tailscale
        # Only GitHub-hosted runners need Tailscale to reach the Daytona server; act (where
        # runner.environment is empty) and self-hosted runners self-skip.
        if: ${{ runner.environment == 'github-hosted' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Verify Daytona API reachable
        run: while ! curl -sf "${DAYTONA_API_URL}/health" >/dev/null; do echo "waiting for Daytona..."; sleep 2; done
        timeout-minutes: 2
        env:
          DAYTONA_API_URL: ${{ vars.DAYTONA_API_URL }}

      - uses: remotebrowser/shared-github-actions/container-health-check@v1
        with:
          image-name: getgather
          build-args: |
            BROWSER_BACKEND=daytona
          health-checks: |
            {"url": "http://localhost:23456/health"}
            {"url": "http://localhost:23456/extended-health"}
          health-timeout-seconds: 180
          extra-config: |-
            --network host
            -e BROWSER_BACKEND=daytona
            -e DAYTONA_API_KEY=${{ secrets.DAYTONA_API_KEY }}
            -e DAYTONA_API_URL=${{ vars.DAYTONA_API_URL }}
            -e DAYTONA_SNAPSHOT=${{ vars.DAYTONA_SNAPSHOT }}

      - name: Delete the health-check Daytona sandbox
        # The extended-health check creates a sandbox named after this runner's hostname
        # (AuthUser.user_id for the noauth user). Runner hostnames repeat across runs, so
        # without cleanup the next run with the same hostname inherits a stopped sandbox
        # (auto_stop_interval=15m) until auto_delete removes it ~60 minutes later. Reuses
        # the image built by the health-check action so the sandbox name and delete path
        # come from the same production code instead of re-deriving them here.
        if: ${{ always() }}
        run: |-
          docker image inspect getgather >/dev/null 2>&1 || { echo "image not built; nothing to clean up"; exit 0; }
          docker run --rm -i --network host --entrypoint python \
            -e BROWSER_BACKEND=daytona \
            -e DAYTONA_API_KEY=${{ secrets.DAYTONA_API_KEY }} \
            -e DAYTONA_API_URL=${{ vars.DAYTONA_API_URL }} \
            -e DAYTONA_SNAPSHOT=${{ vars.DAYTONA_SNAPSHOT }} \
            getgather - <<'EOF'
          import asyncio

          from getgather.auth.auth import _get_user_for_no_auth
          from getgather.browsers.backend import create_backend

          browser_id = _get_user_for_no_auth().user_id
          result = asyncio.run(create_backend().delete_browser(browser_id))
          print(f"delete_browser({browser_id}): {result}")
          EOF
