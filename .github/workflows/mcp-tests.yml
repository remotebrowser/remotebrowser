name: MCP Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  mcp-pytest:
    name: MCP Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Prepare the browser container image
        run: podman pull ghcr.io/remotebrowser/chromium-live

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - run: uvx hatch build

      - name: Launch Remote Browser
        run: uvx ./dist/*.whl > /tmp/app.log 2>&1 &

      - name: Run the health check validation
        run: while ! curl -s 'http://localhost:23456/health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Run MCP tests
        run: uv run pytest -m "mcp" -s -p no:xdist
        env:
          HOST: http://localhost:23456
          BBC_EMAIL: ${{ secrets.BBC_EMAIL }}
          BBC_PASSWORD: ${{ secrets.BBC_PASSWORD }}
          GOODREADS_EMAIL: ${{ secrets.GOODREADS_EMAIL }}
          GOODREADS_PASSWORD: ${{ secrets.GOODREADS_PASSWORD }}
          WAYFAIR_EMAIL: ${{ secrets.WAYFAIR_EMAIL }}
          WAYFAIR_PASSWORD: ${{ secrets.WAYFAIR_PASSWORD }}

      - name: Show application log
        if: always()
        run: |-
          echo "===== Remote Browser log ====="
          cat /tmp/app.log || echo "(no log file)"
