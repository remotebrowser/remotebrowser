name: Package with PyInstaller

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.10.7

      - name: Build executable
        run: uv run --group dev pyinstaller remotebrowser-mcp.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotebrowser-mcp-linux-x86_64
          path: dist/remotebrowser-mcp

  test:
    needs: package
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: remotebrowser-mcp-linux-x86_64

      - run: chmod +x remotebrowser-mcp && ./remotebrowser-mcp &

      - name: Run the health check validation
        run: while ! curl -s 'http://localhost:23456/health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3
